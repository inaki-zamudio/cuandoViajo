<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Trenes Interactivo</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* Animación suave para el movimiento del tren */
        .tren {
            transition: left 0.8s ease-in-out, top 0.8s ease-in-out;
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen p-8">

    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-bold mb-2 text-center text-blue-400">Simulador de Línea de Trenes</h1>
      
        <div class="bg-gray-800 p-4 rounded-xl mb-8 flex flex-wrap gap-6 justify-center items-center border border-gray-700">
            
            <div class="flex gap-4 items-end">
                <button id="btn-iniciar" class="bg-green-600 hover:bg-green-500 text-white font-bold px-6 py-1.5 rounded transition">Iniciar</button>
                <button id="btn-detener" class="bg-red-600 hover:bg-red-500 text-white font-bold px-6 py-1.5 rounded transition opacity-50" disabled>Detener</button>
            </div>
        </div>

        <div class="relative bg-gray-950 p-12 rounded-2xl border border-gray-800 mb-8 overflow-x-auto">
            <div class="absolute h-2 bg-gray-750 left-16 right-16 top-1/2 transform -translate-y-1/2 z-0"></div>
            
            <div id="contenedor-estaciones" class="relative z-10 flex justify-between min-w-[900px]">
                </div>

            <div id="contenedor-trenes" class="absolute inset-0 pointer-events-none z-20">
                </div>
        </div>

     
    </div>

    <script type="module" >
        // CONFIGURACIÓN Y ESTADO
        const TOTAL_ESTACIONES = 10;
        let estacionesDatos = Array(TOTAL_ESTACIONES).fill(0); // los que estan esperando para subir
        let intervaloSimulacion = null;
        let trenesActivos = [];

        // Inicializar datos de las estaciones (todas empiezan en 0)
        for (let i = 1; i <= TOTAL_ESTACIONES; i++) {
            estacionesDatos[i] = 0;
        }
      
        // Elementos del DOM
        const contenedorEstaciones = document.getElementById('contenedor-estaciones');
        const contenedorTrenes = document.getElementById('contenedor-trenes');
        const logPanel = document.getElementById('log');
        const btnIniciar = document.getElementById('btn-iniciar');
        const btnDetener = document.getElementById('btn-detener');
        const inputFrecuencia = document.getElementById('frecuencia');
        
        const tv = 30;
        const vel = 240;

        const lim_subte = 500;

        const sale_inter = 300;
        const simulacion_vel = 60;//cuantas veces mas rapido
        async function agruparViajesPorTiempo(){
            let dic; 
            let dic2;
            await fetch('./datos_ad.json')
            .then(response => {
                if (!response.ok) {
                    throw new Error('Network response was not ok');
                }
                return response.json(); // Parse text container as JSON
            })
            .then(data => {
                //console.log("hola")
                const diccionario = {};
                const diccionario2 = {};//diccionario [tiempo de salida del tren] -> array de cuantos bajan en Y 

                data.forEach(item => {
                    //console.log(item)
                    const tiempo = item.time;
                    const viaje = [item.sal, item.lle]; 
                  
                    if (!diccionario[tiempo]) {
                        diccionario[tiempo] = [];
                    }
                    
                    diccionario[tiempo].push(viaje);             

                    let tiempo_real_tren = Math.ceil((item.time-(item.sal)*(tv+vel))/sale_inter) + (item.sal)*(tv+vel);  //q le llega
                    let tren_time = Math.ceil((item.time-(item.sal)*(tv+vel))/sale_inter)*sale_inter;//el q sale 

                    let mmmm = Math.max(0,tren_time);

                    if(!diccionario2[mmmm]){
                        diccionario2[mmmm] = Array(TOTAL_ESTACIONES).fill(0);
                    }
                    diccionario2[mmmm][item.lle]+=1;
                    if(mmmm == 600){
                        console.log(item.time+ " " + item.sal + " " + item.lle)
                    }
                    //const time_bajo = item.time_bajo;




                });
                //console.log(diccionario)
              
                dic = diccionario;
                dic2 = diccionario2;
                
            })
            .catch(error => {
                console.error('Error loading JSON:', error);
                document.getElementById('output').textContent = 'Failed to load data.';
            });
            return [dic,dic2]
        }
      
        function actualizar_esta(data,segundo){//meto gente en la estacion
            if(!data[segundo])return ;
           // console.log(data[segundo])
            for (let i = 0; i < data[segundo].length;i++){
                let l = data[segundo][i]
                let sal1 = l[0]
                let llle1 = l[1]

                estacionesDatos[sal1-1]+=1;
                //console.log("meti ")
            }
            renderEstaciones()


        }
        // 1. DIBUJAR ESTACIONES INICIALES
        function renderEstaciones() {
            const v1 = 100;
            const v2 = 300;
            contenedorEstaciones.innerHTML = '';
            for (let i = 0; i < TOTAL_ESTACIONES; i++) {
                const valor = estacionesDatos[i];
                
                // Determinar color de la estación según la carga
                let colorBg = 'bg-gray-700';
                let colorBorde = 'border-gray-500';
          

                const estacionHtml = `
                    <div id="estacion-${i}" class="flex flex-col items-center transition-all duration-500" style="width: 80px;">
                        <span class="text-xs font-bold text-gray-400 mb-2">Parada ${i}</span>
                        <div class="w-12 h-12 rounded-full ${colorBg} border-4 ${colorBorde} flex items-center justify-center font-bold shadow-lg text-white transition-all duration-300">
                            ${valor}
                        </div>
                    </div>
                `;
                contenedorEstaciones.insertAdjacentHTML('beforeend', estacionHtml);
            }
        }
       
        const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

        async function crearTren(id,datata) {
            //console.log(id);  

            var pasajeros = 0; // Cantidad aleatoria que mueve (3 a 10)

            const trenId = 'tren-' + id;
            const trenHtml = `
                <div id="${trenId}" class="tren absolute w-8 h-6 bg-blue-500 rounded-md border-2 border-white flex items-center justify-center text-[10px] font-bold text-white shadow-md z-30" style="top: 50%; transform: translateY(-50%);">
                    ${pasajeros}
                </div>
            `;

            contenedorTrenes.insertAdjacentHTML('beforeend', trenHtml);
            const trenElemento = document.getElementById(trenId);

        

            let cuantos_bajan = Array(TOTAL_ESTACIONES).fill(0);
            if(!(!datata[id*300])){
                cuantos_bajan = datata[id*300];
            }else{
                cuantos_bajan = cuantos_bajan;//gg
            }
            for (let i = 0; i < TOTAL_ESTACIONES; i++) {
                const elementoEstacionActual = document.getElementById(`estacion-${i}`);

                pasajeros -= cuantos_bajan[i];
                if(cuantos_bajan[i]>0)
                console.log("bajaron: " + cuantos_bajan[i])

                if (lim_subte - pasajeros  <  estacionesDatos[i]){//hay mas de los que puedo meter
                    estacionesDatos[i] -= lim_subte - pasajeros;
                    pasajeros += lim_subte - pasajeros;
                   
                    console.log("subieron pq si: "+(lim_subte - pasajeros));
                }else{
                    pasajeros += estacionesDatos[i] ;
                    console.log("subieron: "+estacionesDatos[i])
                    estacionesDatos[i] = 0;
                  
                }
                await sleep(tv/simulacion_vel*1000);
                
                
                const circuloEstacion = elementoEstacionActual.querySelector('div');

                if (circuloEstacion) {
                    // 2. Cambias únicamente su texto interno
                    circuloEstacion.innerText = estacionesDatos[i];
                }
                trenElemento.innerText = pasajeros;  
                    if (elementoEstacionActual) {
                    const rectEstacion = elementoEstacionActual.getBoundingClientRect();
                    const rectContenedor = contenedorTrenes.getBoundingClientRect();
                    
                    // Asignación del Left para disparar la transición CSS de movimiento horizontal
                    trenElemento.style.left = `${rectEstacion.left - rectContenedor.left + (rectEstacion.width / 2) - 20}px`;
                    
                    // Actualización directa del número del círculo de la estación actual
                    const circuloEstacion = elementoEstacionActual.querySelector('div');
                    if (circuloEstacion) {
                        circuloEstacion.innerText = estacionesDatos[i];
                    }
                }
            
             
          


                //trenElemento.classList.add('scale-0', 'opacity-0');
                
                await sleep( vel/simulacion_vel*1000); 
             
            
            }
   
            setTimeout(() => {
               trenElemento.remove();
            }, 1000);
           // trenElemento.remove();
          //  clearInterval(intervaloSimulacion);
        }
        var ii=0
     
        let datas = await agruparViajesPorTiempo()
        let data = datas[0];
        let data2 = datas[1];
    
        console.log(data2)   
        // 4. CONTROLADORES DE EVENTOS
        btnIniciar.addEventListener('click', () => {

            //agregarLog(`▶️ Simulador iniciado. Un tren cada ${segundos} segundos.`, 'info');
            crearTren(ii,data2);
                ii++;
            
            // Configurar bucle según los segundos indicados
            
            let counter = 0;
            let intervaloSimulacion2 = setInterval(()=>{
                actualizar_esta(data,counter);
                counter+=1;
               // console.log(counter)
            },1000/simulacion_vel);
          
            
            intervaloSimulacion = setInterval(()=>{
                crearTren(ii,data2);
                ii++;
            },sale_inter/simulacion_vel*1000);


        });

        btnDetener.addEventListener('click', () => {
            clearInterval(intervaloSimulacion);
            intervaloSimulacion = null;

            btnIniciar.disabled = false;
            btnIniciar.classList.remove('opacity-50');
            btnDetener.disabled = true;
            btnDetener.classList.add('opacity-50');
            inputFrecuencia.disabled = false;

            agregarLog(`⏹️ Simulador pausado. Los trenes en ruta terminarán su viaje.`, 'info');
        });

        // Carga inicial de la pantalla
        renderEstaciones();
        // Ajustar posiciones si cambia el tamaño de pantalla
        window.addEventListener('resize', renderEstaciones);
    </script>
</body>
</html>
